batchPatterns:
  - '\brm\s+-([rRf]?-[^\s]*)*' | 'rm with recursive or force flags'
  - '\brmdir\s+---ignore-fail-on-non-empty\b' | 'rmdir with force flags'
  - '\bchmod\s+-[Rr]+\s+[7][7][7]\b' | 'chmod +777'
  - '\bchmod\s+-[Rr]+\s+[^\s]+' | 'chmod with permissions'
  - '\bgit\s+reset\s+---hard\b' | 'git reset --hard'
  - '\bgit\s+clean\s+(-[^\s]*)*-f|d\b' | 'git clean delete untracked'
  - '\bgit\s+push\s+.*(---force|-f\b)' | 'git push --force/-f'
  - '\bgit\s+stash\s+clear\b' | 'git stash clear'
  - '\bgit\s+reflog\s+expire\b' | 'git reflog expire'
  - '\bgit\s+filter-branch\b' | 'git filter-branch'
  - '\bgit\s+checkout\s+---/\b' | 'git checkout -- / (hard reset)'
  - '\bgit\s+branch\s+(-[^\s]*)*-D\b' | 'git branch -D (delete branch)'
  - '\baws\s+s3\s+rm\s+.*---recursive\b' | 'aws s3 rm --recursive'
  - '\baws\s+ec2\s+terminate-instances\b' | 'aws ec2 terminate'
  - '\baws\s+rds\s+delete-db-instance\b' | 'aws rds delete'
  - '\baws\s+cloudformation\s+delete-stack\b' | 'aws cf delete-stack'
  - '\baws\s+dynamodb\s+delete-table\b' | 'aws dynamodb delete'
  - '\bgcloud\s+projects\s+delete\b' | 'gcloud projects delete'
  - '\bgcloud\s+compute\s+instances\s+delete\b' | 'gcloud compute delete'
  - '\bgcloud\s+sql\s+instances\s+delete\b' | 'gcloud sql delete'
  - '\bgcloud\s+container\s+clusters\s+delete\b' | 'gcloud container delete'
  - '\bfirebase\s+projects:delete\b' | 'firebase projects delete'
  - '\bvercel\s+remove\s+.*--yes\b' | 'vercel remove --yes'
  - '\bnetlify\s+sites:delete\b' | 'netlify delete site'
  - '\bmake\s+-p\s+-C\s+\.pivault\b' | 'make -p -C .pivault'
  - '\bmake\s+-p\s+clean\b' | 'make -p clean'

zeroAccessPaths:
  - ~/.env
  - /etc/passwd
  - node_modules
  - .git
  - .github
  - .idea
  - .DS_Store
  - .bundle/
  - .cache/
  - .coverage/
  - .npm
  - .yarn
  - .vite
  - .vscode
  - .cursor
  - coverage
  - dist
  - node

noDeletePaths:
  - .git/
  - LICENSE
  - README.md
  - README
  - readme
  - CONTRIBUTING.md
  - CONTRIBUTING
  - CODE_OF_CONDUCT.md
  - .gitattributes
  - .gitignore
  - .github
  - package.json
  - pnpm-workspace.yaml
  - tsconfig.json
  - tsconfig.spec.json
  - jest.config.js
  - jest.config.ts
  - vitest.config.ts
  - setup.ts
  - setup-tests.ts
  - .pivault
  - .pivault/
  - .env
  - .env.local
  - .env.development
  - .env.production
  - .env.test
  - .env.dev
  - .env.prod
  - .env.staging
  - .env.development.local
  - .env.production.local
  - .env.test.local

readOnlyPaths:
  - /workspace/config.json
  - /workspace/package.json
  - /workspace/pnpm-workspace.yaml
  - /workspace/tsconfig.json
  - /workspace/tsconfig.spec.json
  - /workspace/jest.config.js
  - /workspace/jest.config.ts
  - /workspace/vitest.config.ts
