# === Way of Pi Team Extensions ===
# Location: .pi/agent/extensions/teams.yaml
# Use: pi -e teams or pi -e build-orchestra
# All agents loaded from: .pi/agents/*.md
# Or: pi -e <team-name>

---

# === Main Orchestra (All Agents) ===
# Loads ALL agents from .pi/agents/*.md automatically
name: build-orchestra
description: "Full build orchestra with all .md agents from .pi/agents/"
members: []  # Empty - loads all .md agents automatically
load_command: pi -e build-orchestra

---

# === Way (Main Orchestrator) ===
# Main Way of Pi orchestrator
name: way
description: "Main Way of Pi orchestrator agent"
members: []
load_command: pi -e way

---

# === All Available Agents ===
# Loads all .md agents from .pi/agents/
name: all-way-agents
description: "All available .md agents in .pi/agents/"
members: []
load_command: pi -e all-way-agents

