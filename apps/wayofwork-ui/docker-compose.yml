version: '3.8'

services:
  wayofpi:
    build:
      context: ../../
      dockerfile: apps/wayofwork-ui/Dockerfile
    ports:
      - "3333:3333"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - WOP_AUTH_SECRET=change-me-in-production
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
